<!DOCTYPE html>
<html lang="en" data-site-root="..">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Log in – My Psych Training</title>
  <link rel="stylesheet" href="../styles-light.css" />
  <style>
    .auth-page { max-width: 400px; margin: 4rem auto; padding: 0 1.5rem; }
    .auth-page h1 { font-size: 1.5rem; margin-bottom: 1rem; }
    .auth-form .form-row { margin-bottom: 1rem; }
    .auth-form label { display: block; font-weight: 600; margin-bottom: 0.35rem; }
    .auth-form input { width: 100%; padding: 0.6rem 0.75rem; border: 1px solid var(--border); border-radius: var(--radius); font-size: 1rem; }
    .password-wrap { position: relative; }
    .password-wrap input { padding-right: 2.5rem; }
    .password-toggle { position: absolute; right: 0.45rem; top: 50%; transform: translateY(-50%); border: 0; background: transparent; cursor: pointer; font-size: 1rem; line-height: 1; }
    .auth-form .btn { width: 100%; margin-top: 0.5rem; }
    .auth-form .error { color: #c53030; font-size: 0.9rem; margin-top: 0.5rem; }
    .auth-form .link { margin-top: 1rem; text-align: center; }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="site-header-inner">
      <a href="../" class="brand"><div class="brand-mark"></div><span>My Psych Training</span></a>
      <nav class="main-nav"><ul><li><a href="../">Home</a></li><li><a href="../meq/">MEQ Course</a></li><li><a href="../signup/" class="nav-cta">Sign up</a></li></ul></nav>
    </div>
  </header>

  <main class="auth-page">
    <h1>Log in<a href="../admin-signin/" class="login-admin-dot" aria-label="Staff sign-in" title="">.</a></h1>
    <form class="auth-form" id="loginForm">
      <div class="form-row">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required autocomplete="email" />
      </div>
      <div class="form-row">
        <label for="password">Password</label>
        <div class="password-wrap">
          <input type="password" id="password" name="password" required autocomplete="current-password" />
          <button type="button" class="password-toggle" data-target="password" aria-label="Show password">👁</button>
        </div>
      </div>
      <div id="loginError" class="error" role="alert"></div>
      <button type="submit" class="btn">Log in</button>
    </form>
    <p class="link"><a href="../forgot-password/">Forgot password?</a></p>
    <p class="link"><a href="../signup/">Don’t have an account? Sign up</a></p>
  </main>

  <script src="../js/site-paths.js?v=20260428b"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase-config.js?v=20260428b"></script>
  <script src="../js/auth.js?v=20260428b"></script>
  <script>
    function withTimeout(promise, ms, message) {
      return Promise.race([
        promise,
        new Promise((_, reject) => setTimeout(() => reject(new Error(message || 'Login request timed out. Please try again.')), ms))
      ]);
    }

    async function directRestLogin(email, password) {
      const base = (window.SUPABASE_URL || '').replace(/\/$/, '');
      const key = window.SUPABASE_ANON_KEY || '';
      if (!base || !key) throw new Error('Supabase config missing.');
      const res = await fetch(base + '/auth/v1/token?grant_type=password', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          apikey: key
        },
        body: JSON.stringify({ email, password })
      });
      const payload = await res.json().catch(() => ({}));
      if (!res.ok) {
        throw new Error(payload?.error_description || payload?.msg || payload?.error || 'Log in failed.');
      }
      if (!payload?.access_token || !payload?.refresh_token || !window.ktrainAuth?.client?.auth?.setSession) {
        throw new Error('Log in failed: invalid auth response.');
      }
      await window.ktrainAuth.client.auth.setSession({
        access_token: payload.access_token,
        refresh_token: payload.refresh_token
      });
      return payload;
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const err = document.getElementById('loginError');
      const submitBtn = document.querySelector('#loginForm button[type="submit"]');
      err.textContent = '';
      let uiWatchdog = null;
      if (submitBtn) {
        submitBtn.disabled = true;
        submitBtn.textContent = 'Signing in...';
        uiWatchdog = setTimeout(() => {
          submitBtn.disabled = false;
          submitBtn.textContent = 'Log in';
          if (!err.textContent) err.textContent = 'Login is taking too long. Please try again.';
        }, 20000);
      }
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const params = new URLSearchParams(location.search);
      const fallback = typeof window.ktrainPaths !== 'undefined' ? window.ktrainPaths.dashboard() : '../dashboard/';
      let redirect = params.get('redirect') || fallback;
      try {
        if (!window.ktrainAuth) throw new Error('Supabase not configured. Add your URL and anon key in js/supabase-config.js');
        // Use direct REST auth (most reliable path for this deployment).
        await withTimeout(
          directRestLogin(String(email || '').trim().toLowerCase(), password),
          45000,
          'Login request timed out. Please try again.'
        );
        // Force non-staff login to student dashboard to avoid admin profile lookup stalls.
        if (/\/admin\/?$/i.test(redirect)) redirect = fallback;
        window.location.href = redirect;
      } catch (x) {
        const msg = x?.message || 'Log in failed.';
        if (/failed to fetch|network error reaching supabase/i.test(msg)) {
          err.textContent = 'Could not contact Supabase. Check internet/VPN/ad-blocker and ensure the site is opened via http(s), not file://.';
        } else if (/invalid login credentials/i.test(msg)) {
          err.textContent = 'Incorrect email or password.';
        } else if (/invalid auth response/i.test(msg)) {
          err.textContent = 'Login failed while saving session. Please disable strict privacy blockers and try again.';
        } else if (/email.*confirm|confirm.*email|no active session/i.test(msg)) {
          err.textContent = 'Please confirm your email address, then log in again.';
        } else {
          err.textContent = msg;
        }
      } finally {
        if (uiWatchdog) clearTimeout(uiWatchdog);
        if (submitBtn) {
          submitBtn.disabled = false;
          submitBtn.textContent = 'Log in';
        }
      }
    });

    document.querySelectorAll('.password-toggle').forEach((btn) => {
      btn.addEventListener('click', () => {
        const input = document.getElementById(btn.getAttribute('data-target'));
        if (!input) return;
        const isVisible = input.type === 'text';
        input.type = isVisible ? 'password' : 'text';
        btn.setAttribute('aria-label', isVisible ? 'Show password' : 'Hide password');
      });
    });
  </script>
</body>
</html>
