<!DOCTYPE html>
<html lang="en" data-site-root="..">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign up – My Psych Training</title>
  <link rel="stylesheet" href="../styles-light.css" />
  <style>
    .auth-page { max-width: 420px; margin: 4rem auto; padding: 0 1.5rem; }
    .auth-page h1 { font-size: 1.5rem; margin-bottom: 1rem; }
    .auth-form .form-row { margin-bottom: 1rem; }
    .auth-form label { display: block; font-weight: 600; margin-bottom: 0.35rem; }
    .auth-form input { width: 100%; padding: 0.6rem 0.75rem; border: 1px solid var(--border); border-radius: var(--radius); font-size: 1rem; }
    .password-wrap { position: relative; }
    .password-wrap input { padding-right: 2.5rem; }
    .password-toggle { position: absolute; right: 0.45rem; top: 50%; transform: translateY(-50%); border: 0; background: transparent; cursor: pointer; font-size: 1rem; line-height: 1; }
    .auth-form .btn { width: 100%; margin-top: 0.5rem; }
    .auth-form .error { color: #c53030; font-size: 0.9rem; margin-top: 0.5rem; }
    .auth-form .status { font-size: 0.9rem; margin-top: 0.5rem; }
    .auth-form .status.ok { color: #2f855a; }
    .auth-form .status.fail { color: #c53030; }
    .auth-form .link { margin-top: 1rem; text-align: center; }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="site-header-inner">
      <a href="../" class="brand"><div class="brand-mark"></div><span>My Psych Training</span></a>
      <nav class="main-nav"><ul><li><a href="../">Home</a></li><li><a href="../meq/">MEQ Course</a></li><li><a href="../login/" class="nav-cta">Log in</a></li></ul></nav>
    </div>
  </header>

  <main class="auth-page">
    <h1>Sign up</h1>
    <form class="auth-form" id="signupForm">
      <div class="form-row">
        <label for="full_name">Name</label>
        <input type="text" id="full_name" name="full_name" required autocomplete="name" />
      </div>
      <div class="form-row">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required autocomplete="email" />
      </div>
      <div class="form-row">
        <label for="phone">Phone number</label>
        <input type="tel" id="phone" name="phone" required autocomplete="tel" />
      </div>
      <div class="form-row">
        <label for="college_id">College ID</label>
        <input type="text" id="college_id" name="college_id" required />
      </div>
      <div class="form-row">
        <label for="password">Password</label>
        <div class="password-wrap">
          <input type="password" id="password" name="password" required autocomplete="new-password" minlength="6" />
          <button type="button" class="password-toggle" data-target="password" aria-label="Show password">👁</button>
        </div>
      </div>
      <div id="signupError" class="error" role="alert"></div>
      <button type="button" class="btn btn-secondary" id="testSupabaseBtn">Test Supabase connection</button>
      <div id="supabaseStatus" class="status" role="status" aria-live="polite"></div>
      <button type="submit" class="btn">Sign up</button>
    </form>
    <p class="link"><a href="../login/">Already have an account? Log in</a></p>
  </main>

  <script src="../js/site-paths.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase-config.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const err = document.getElementById('signupError');
      err.textContent = '';
      const payload = {
        full_name: document.getElementById('full_name').value.trim(),
        email: document.getElementById('email').value.trim(),
        phone: document.getElementById('phone').value.trim(),
        college_id: document.getElementById('college_id').value.trim(),
        password: document.getElementById('password').value
      };
      try {
        if (!window.ktrainAuth) throw new Error('Supabase not configured. Add your URL and anon key in js/supabase-config.js');
        const result = await window.ktrainAuth.signUp(payload);
        if (!result?.session) {
          err.textContent = 'Check your email to confirm your account, then log in.';
          return;
        }
        const dash = typeof window.ktrainPaths !== 'undefined' ? window.ktrainPaths.dashboard() : '../dashboard/';
        window.location.href = dash;
      } catch (x) {
        const msg = x?.message || 'Sign up failed.';
        if (/user already registered/i.test(msg)) {
          err.textContent = 'This email is already registered. Please log in instead.';
        } else if (/password/i.test(msg)) {
          err.textContent = msg;
        } else if (/database error saving new user/i.test(msg)) {
          err.textContent = 'Sign up failed: database trigger/schema issue. In Supabase, run the latest schema + open-access migration, then retry.';
        } else if (/invalid email/i.test(msg)) {
          err.textContent = 'Please enter a valid email address.';
        } else if (/failed to fetch|network error reaching supabase/i.test(msg)) {
          err.textContent = 'Could not contact Supabase. Check internet/VPN/ad-blocker and ensure the site is opened via http(s), not file://.';
        } else {
          err.textContent = 'Sign up failed: ' + msg;
        }
      }
    });

    document.getElementById('testSupabaseBtn').addEventListener('click', async () => {
      const status = document.getElementById('supabaseStatus');
      const btn = document.getElementById('testSupabaseBtn');
      status.textContent = 'Testing connection...';
      status.className = 'status';
      btn.disabled = true;
      try {
        const base = (window.SUPABASE_URL || '').replace(/\/$/, '');
        if (!base) throw new Error('Supabase URL is missing in js/supabase-config.js');
        const res = await fetch(base + '/auth/v1/settings', {
          method: 'GET',
          headers: { apikey: window.SUPABASE_ANON_KEY || '' }
        });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        status.textContent = 'Connected to Supabase successfully.';
        status.className = 'status ok';
      } catch (err) {
        status.textContent = 'Connection failed: ' + (err?.message || 'Unknown error');
        status.className = 'status fail';
      } finally {
        btn.disabled = false;
      }
    });

    document.querySelectorAll('.password-toggle').forEach((btn) => {
      btn.addEventListener('click', () => {
        const input = document.getElementById(btn.getAttribute('data-target'));
        if (!input) return;
        const isVisible = input.type === 'text';
        input.type = isVisible ? 'password' : 'text';
        btn.setAttribute('aria-label', isVisible ? 'Show password' : 'Hide password');
      });
    });
  </script>
</body>
</html>
